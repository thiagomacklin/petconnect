<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Recuperar Senha | Amigos de Patas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- RECUPERAÇÃO DE SENHA -->
<section class="login-section">

<div class="container">

<div class="row justify-content-center align-items-center min-vh-100">

<div class="col-lg-5">

<div class="login-card">

<!-- HEADER -->
<div class="text-center mb-4">
    <h2 class="logo">🐾 Amigos de Patas</h2>
    <p class="text-muted">Recuperação de senha</p>
</div>

<!-- FORM -->
<form>

<p class="text-muted mb-4 text-center">
Informe seu e-mail para receber as instruções de redefinição de senha.
</p>

<!-- E-mail -->
<div class="mb-3">
<label class="form-label">E-mail</label>
<input type="email" class="form-control" placeholder="exemplo@email.com">
</div>

<!-- BOTÃO -->
<button type="submit" class="btn btn-principal w-100">
Enviar link de recuperação
</button>

</form>

<!-- LINK VOLTAR -->
<div class="text-center mt-4">
<a href="#" class="text-decoration-none">
← Voltar para o login
</a>
</div>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
