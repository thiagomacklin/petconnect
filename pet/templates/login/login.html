{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login | Amigos de Patas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="{% static 'style.css' %}">

</head>

<body>

<!-- CONTAINER LOGIN -->
<section class="login-section">

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-lg-5">

                <div class="login-card">

                    <!-- LOGO -->
                    <div class="text-center mb-4">

                        <h2 class="logo">
                            🐾 Amigos de Patas
                        </h2>

                        <p class="text-muted">
                            Acesso administrativo
                        </p>

                    </div>

                    <!-- ERRO -->
                    {% if erro %}

                    <div class="alert alert-danger">
                        {{ erro }}
                    </div>

                    {% endif %}

                    <!-- FORM -->
                    <form method="POST">

                        {% csrf_token %}

                        <!-- Usuário -->
                        <div class="mb-3">

                            <label class="form-label">
                                Usuário
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Digite seu usuário"
                                required>

                        </div>

                        <!-- Senha -->
                        <div class="mb-3">

                            <label class="form-label">
                                Senha
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Digite sua senha"
                                required>

                        </div>

                        <!-- Lembrar -->
                        <div class="d-flex justify-content-between align-items-center mb-3">

                            <div class="form-check">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="lembrar">

                                <label
                                    class="form-check-label"
                                    for="lembrar">

                                    Lembrar de mim

                                </label>

                            </div>

                            <a href="#"
                               class="small text-decoration-none">

                                Esqueci a senha

                            </a>

                        </div>

                        <!-- BOTÃO -->
                        <button
                            type="submit"
                            class="btn btn-principal w-100">

                            Entrar

                        </button>

                    </form>

                    <!-- LOGADO -->
                    {% if user.is_authenticated %}

                    <div class="alert alert-success mt-4">

                        Você está logado como
                        <strong>{{ user.username }}</strong>.

                        <div class="mt-3">

                            <a href="{% url 'logout' %}"
                               class="btn btn-danger">

                                Sair

                            </a>

                        </div>

                    </div>

                    {% endif %}

                    <!-- RODAPÉ -->
                    <div class="text-center mt-4">

                        <p class="text-muted small">
                            Sistema interno da ONG Amigos de Patas
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
